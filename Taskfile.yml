version: "3"

includes:
  infra:
    taskfile: infra/Taskfile.yml
    dir: infra
  ansible:
    taskfile: ansible/Taskfile.yml
    dir: ansible

tasks:
  default:
    aliases: [help]
    desc: Show available commands
    silent: true
    cmds:
      - |
        source scripts/colors.sh
        printf "\n"
        printf "  ${BOLD}Deploy${NC}\n"
        printf "  ${BOLD_CYAN}task deploy${NC}          Full deploy: Terraform → Ansible → ArgoCD\n"
        printf "  ${BOLD_CYAN}task deploy:infra${NC}    Terraform apply\n"
        printf "  ${BOLD_CYAN}task deploy:server${NC}   Ansible playbook (generate inventory + play)\n"
        printf "  ${BOLD_CYAN}task deploy:argocd${NC}   Install ArgoCD and apply applications\n"
        printf "\n"
        printf "  ${BOLD}Status${NC}\n"
        printf "  ${BOLD_CYAN}task status${NC}          Show cluster and VPN status\n"
        printf "  ${BOLD_CYAN}task ip${NC}              Show server public IP\n"
        printf "\n"
        printf "  ${BOLD}Sub-taskfiles${NC}\n"
        printf "  ${BOLD_CYAN}task infra:${NC}...       Terraform commands (task infra:help)\n"
        printf "  ${BOLD_CYAN}task ansible:${NC}...     Ansible commands (task ansible:help)\n"
        printf "\n"

  deploy:
    desc: "Full deploy: Terraform → Ansible → ArgoCD"
    cmds:
      - task: deploy:infra
      - task: deploy:server
      - task: deploy:argocd

  deploy:infra:
    desc: Terraform apply
    dir: infra
    preconditions:
      - sh: command -v terraform
        msg: "terraform not installed — brew install terraform"
    cmds:
      - terraform init -input=false
      - terraform apply -auto-approve

  deploy:server:
    desc: Ansible — generate inventory and run playbook
    dir: ansible
    preconditions:
      - sh: command -v ansible-playbook
        msg: "ansible not installed — brew install ansible"
      - sh: test -f .vault_pass
        msg: ".vault_pass not found — create it with your vault password"
    cmds:
      - python3 ../scripts/generate-inventory.py
      - ansible-playbook playbook.yml

  deploy:argocd:
    desc: Install ArgoCD and apply all applications
    vars:
      SERVER_IP:
        sh: cd infra && terraform output -raw server_ip
    preconditions:
      - sh: command -v kubectl
        msg: "kubectl not installed — brew install kubectl"
      - sh: command -v ssh
        msg: "ssh not available"
    cmds:
      - |
        source scripts/colors.sh
        printf "${BOLD_CYAN}Installing ArgoCD on cluster...${NC}\n"
        ssh -o StrictHostKeyChecking=no root@{{.SERVER_IP}} '
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f - &&
          kubectl apply -n argocd --server-side --force-conflicts \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml &&
          kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s
        '
      - |
        source scripts/colors.sh
        printf "${BOLD_CYAN}Applying ArgoCD applications...${NC}\n"
        scp -o StrictHostKeyChecking=no -r k8s/argocd/ root@{{.SERVER_IP}}:/tmp/argocd-apps/
        ssh -o StrictHostKeyChecking=no root@{{.SERVER_IP}} '
          kubectl apply -f /tmp/argocd-apps/ &&
          rm -rf /tmp/argocd-apps/
        '
      - |
        source scripts/colors.sh
        PASS=$(ssh -o StrictHostKeyChecking=no root@{{.SERVER_IP}} \
          "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d")
        printf "\n${BOLD_GREEN}ArgoCD installed.${NC}\n"
        printf "  Admin password: ${BOLD}${PASS}${NC}\n"
        printf "  ArgoCD will now sync: Sealed Secrets, Envoy Gateway, CouchDB, Headscale UI\n\n"

  status:
    desc: Show cluster and VPN status
    vars:
      SERVER_IP:
        sh: cd infra && terraform output -raw server_ip
    cmds:
      - |
        source scripts/colors.sh
        printf "\n${BOLD}Cluster status:${NC}\n"
        ssh -o StrictHostKeyChecking=no root@{{.SERVER_IP}} '
          echo "--- Nodes ---"
          kubectl get nodes -o wide
          echo ""
          echo "--- Pods (all namespaces) ---"
          kubectl get pods -A
          echo ""
          echo "--- Headscale nodes ---"
          headscale nodes list
          echo ""
          echo "--- Tailscale VPN IP ---"
          tailscale ip -4
        '

  ip:
    desc: Show server public IP
    dir: infra
    silent: true
    cmds:
      - terraform output -raw server_ip
