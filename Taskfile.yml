version: "3"

includes:
  infra:
    taskfile: infra/Taskfile.yml
    dir: infra
  ansible:
    taskfile: ansible/Taskfile.yml
    dir: ansible

tasks:
  default:
    aliases: [help]
    desc: Show available commands
    silent: true
    cmds:
      - |
        source scripts/colors.sh
        printf "\n"
        printf "  ${BOLD}Full Deploy${NC}\n"
        printf "  ${BOLD_CYAN}task deploy${NC}              Terraform → Ansible\n"
        printf "\n"
        printf "  ${BOLD}Step-by-step${NC}\n"
        printf "  ${BOLD_CYAN}task deploy:infra${NC}        Terraform apply\n"
        printf "  ${BOLD_CYAN}task deploy:server${NC}       Ansible playbook\n"
        printf "\n"
        printf "  ${BOLD}Status${NC}\n"
        printf "  ${BOLD_CYAN}task status${NC}              Show all services status\n"
        printf "  ${BOLD_CYAN}task ip${NC}                  Show server public IP\n"
        printf "\n"
        printf "  ${BOLD}Sub-taskfiles${NC}\n"
        printf "  ${BOLD_CYAN}task infra:${NC}...           Terraform commands (task infra:help)\n"
        printf "  ${BOLD_CYAN}task ansible:${NC}...         Ansible commands (task ansible:help)\n"
        printf "\n"

  deploy:
    desc: "Full deploy: Terraform → Ansible"
    cmds:
      - task: deploy:infra
      - task: deploy:server

  deploy:infra:
    desc: Terraform apply
    dir: infra
    preconditions:
      - sh: command -v terraform
        msg: "terraform not installed — brew install terraform"
    cmds:
      - terraform init -input=false
      - terraform apply -auto-approve

  deploy:server:
    desc: Ansible — generate inventory and run playbook
    dir: ansible
    preconditions:
      - sh: command -v ansible-playbook
        msg: "ansible not installed — brew install ansible"
      - sh: test -f .vault_pass
        msg: ".vault_pass not found — create it with your vault password"
    cmds:
      - python3 ../scripts/generate-inventory.py
      - ansible-playbook playbook.yml

  status:
    desc: Show all services status on the server
    silent: true
    cmds:
      - |
        source scripts/colors.sh
        SERVER_IP=$(cd infra && terraform output -raw server_ip 2>/dev/null)
        printf "\n${BOLD}Server IP:${NC} ${SERVER_IP}\n"
        printf "\n${BOLD}Caddy:${NC}\n"
        ssh -o StrictHostKeyChecking=no root@${SERVER_IP} 'docker compose -f /opt/caddy/compose.yaml ps'
        printf "\n${BOLD}CouchDB:${NC}\n"
        ssh -o StrictHostKeyChecking=no root@${SERVER_IP} 'docker compose -f /opt/couchdb/compose.yaml ps'
        printf "\n${BOLD}Headscale:${NC}\n"
        ssh -o StrictHostKeyChecking=no root@${SERVER_IP} 'docker compose -f /opt/headscale/compose.yaml ps'

  ip:
    desc: Show server public IP
    dir: infra
    silent: true
    cmds:
      - terraform output -raw server_ip
