version: "3"

includes:
  infra:
    taskfile: infra/Taskfile.yml
    dir: infra
  ansible:
    taskfile: ansible/Taskfile.yml
    dir: ansible
  k8s:
    taskfile: k8s/Taskfile.yml
    dir: k8s

tasks:
  default:
    aliases: [help]
    desc: Show available commands
    silent: true
    cmds:
      - |
        source scripts/colors.sh
        printf "\n"
        printf "  ${BOLD}Full Deploy${NC}\n"
        printf "  ${BOLD_CYAN}task deploy${NC}                    Terraform → Ansible → kubeconfig → ArgoCD\n"
        printf "\n"
        printf "  ${BOLD}Step-by-step${NC}\n"
        printf "  ${BOLD_CYAN}task deploy:infra${NC}              Terraform apply\n"
        printf "  ${BOLD_CYAN}task deploy:server${NC}             Ansible playbook\n"
        printf "  ${BOLD_CYAN}task k8s:kubeconfig-fetch${NC}      Fetch kubeconfig (VPN access)\n"
        printf "  ${BOLD_CYAN}task k8s:argocd-install${NC}        Install ArgoCD via Helm\n"
        printf "\n"
        printf "  ${BOLD}Sealed Secrets${NC}\n"
        printf "  ${BOLD_CYAN}task k8s:sealed-secrets:backup${NC}  Backup key to 1Password\n"
        printf "  ${BOLD_CYAN}task k8s:sealed-secrets:restore${NC} Restore key from 1Password\n"
        printf "  ${BOLD_CYAN}task k8s:sealed-secrets:status${NC}  Show key status\n"
        printf "\n"
        printf "  ${BOLD}Status${NC}\n"
        printf "  ${BOLD_CYAN}task status${NC}                    Show cluster and VPN status\n"
        printf "  ${BOLD_CYAN}task k8s:argocd-status${NC}         Show ArgoCD applications\n"
        printf "  ${BOLD_CYAN}task k8s:argocd-password${NC}       Get ArgoCD admin password\n"
        printf "  ${BOLD_CYAN}task ip${NC}                        Show server public IP\n"
        printf "\n"
        printf "  ${BOLD}Sub-taskfiles${NC}\n"
        printf "  ${BOLD_CYAN}task infra:${NC}...                 Terraform commands (task infra:help)\n"
        printf "  ${BOLD_CYAN}task ansible:${NC}...               Ansible commands (task ansible:help)\n"
        printf "\n"

  deploy:
    desc: "Full deploy: Terraform → Ansible → kubeconfig → ArgoCD"
    cmds:
      - task: deploy:infra
      - task: deploy:server
      - task: k8s:kubeconfig-fetch
      - task: k8s:argocd-install

  deploy:infra:
    desc: Terraform apply
    dir: infra
    preconditions:
      - sh: command -v terraform
        msg: "terraform not installed — brew install terraform"
    cmds:
      - terraform init -input=false
      - terraform apply -auto-approve

  deploy:server:
    desc: Ansible — generate inventory and run playbook
    dir: ansible
    preconditions:
      - sh: command -v ansible-playbook
        msg: "ansible not installed — brew install ansible"
      - sh: test -f .vault_pass
        msg: ".vault_pass not found — create it with your vault password"
    cmds:
      - python3 ../scripts/generate-inventory.py
      - ansible-playbook playbook.yml

  status:
    desc: Show cluster and VPN status
    cmds:
      - |
        source scripts/colors.sh
        printf "\n${BOLD}Cluster nodes:${NC}\n"
        kubectl get nodes -o wide
        printf "\n${BOLD}Pods (all namespaces):${NC}\n"
        kubectl get pods -A
        printf "\n${BOLD}ArgoCD applications:${NC}\n"
        kubectl get applications -n argocd 2>/dev/null || printf "  ArgoCD not installed\n"
        printf "\n${BOLD}Headscale nodes:${NC}\n"
        ssh -o StrictHostKeyChecking=no root@$(cd infra && terraform output -raw server_ip) 'headscale nodes list'

  ip:
    desc: Show server public IP
    dir: infra
    silent: true
    cmds:
      - terraform output -raw server_ip
