---
# Root Application — App-of-Apps pattern
# Points to k8s/argocd/apps/ which contains all Application manifests.
# ArgoCD will automatically sync everything from GitHub on install.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/qwqw-333/vps.git
    targetRevision: main
    path: k8s/argocd/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
