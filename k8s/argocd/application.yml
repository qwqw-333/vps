---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: couchdb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "REPLACE_WITH_GITHUB_REPO_URL"   # e.g. https://github.com/user/vps.git
    targetRevision: HEAD
    path: k8s/apps/couchdb
  destination:
    server: https://kubernetes.default.svc
    namespace: obsidian-sync
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
