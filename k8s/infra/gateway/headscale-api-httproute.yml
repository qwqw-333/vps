---
# Proxies Headscale API through the gateway to avoid CORS for headscale-ui
apiVersion: v1
kind: Service
metadata:
  name: headscale-api
  namespace: envoy-gateway-system
spec:
  type: ExternalName
  externalName: host.k3s.internal
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale-api
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: vpn-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
        - path:
            type: PathPrefix
            value: /machine
        - path:
            type: PathPrefix
            value: /key
        - path:
            type: PathPrefix
            value: /oidc
      backendRefs:
        - name: headscale-api
          group: ""
          kind: Service
          namespace: envoy-gateway-system
          port: 443
          weight: 1
