version: "3"

silent: true

vars:
  SERVER_IP:
    sh: cd ../infra && terraform output -raw server_ip 2>/dev/null || echo ""

tasks:
  # ===========================================================================
  # Internal checks
  # ===========================================================================

  _check:cluster:
    internal: true
    preconditions:
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl not found — brew install kubectl"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "Cannot connect to cluster. Run: task k8s:kubeconfig-fetch"

  _check:helm:
    internal: true
    preconditions:
      - sh: command -v helm >/dev/null 2>&1
        msg: "helm not found — brew install helm"

  _check:op:
    internal: true
    preconditions:
      - sh: command -v op >/dev/null 2>&1
        msg: "1Password CLI not found — brew install 1password-cli"
      - sh: op whoami >/dev/null 2>&1
        msg: "Not signed in to 1Password — run: op signin"

  # ===========================================================================
  # Kubeconfig
  # ===========================================================================

  kubeconfig-fetch:
    desc: Fetch kubeconfig from server and configure for Headscale VPN access
    preconditions:
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl not found — brew install kubectl"
      - sh: "[ -n '{{.SERVER_IP}}' ]"
        msg: "Cannot get server IP from Terraform. Run: task deploy:infra first"
    cmds:
      - bash ../scripts/kubeconfig.sh fetch {{.SERVER_IP}}

  kubeconfig-delete:
    desc: Remove vps context from ~/.kube/config
    cmds:
      - bash ../scripts/kubeconfig.sh delete

  kubeconfig-list:
    desc: List available kubectl contexts
    cmds:
      - bash ../scripts/kubeconfig.sh list

  # ===========================================================================
  # ArgoCD
  # ===========================================================================

  argocd-install:
    desc: Install ArgoCD via Helm and apply root application
    deps: [_check:cluster, _check:helm]
    cmds:
      - bash scripts/argocd.sh install

  argocd-uninstall:
    desc: Uninstall ArgoCD
    deps: [_check:cluster]
    cmds:
      - bash scripts/argocd.sh uninstall

  argocd-status:
    desc: Show ArgoCD pods and applications
    deps: [_check:cluster]
    cmds:
      - bash scripts/argocd.sh status

  argocd-password:
    desc: Get ArgoCD admin password
    deps: [_check:cluster]
    cmds:
      - bash scripts/argocd.sh password

  # ===========================================================================
  # Sealed Secrets
  # ===========================================================================

  sealed-secrets:backup:
    desc: Export Sealed Secrets key pair from cluster and save to 1Password
    deps: [_check:cluster, _check:op]
    cmds:
      - bash scripts/sealed-secrets.sh backup

  sealed-secrets:restore:
    desc: Import Sealed Secrets key pair from 1Password into cluster
    deps: [_check:cluster, _check:op]
    cmds:
      - bash scripts/sealed-secrets.sh restore

  sealed-secrets:status:
    desc: Show Sealed Secrets key status in cluster and 1Password
    cmds:
      - bash scripts/sealed-secrets.sh status
