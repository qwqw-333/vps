---
# Template: replace base64 values before applying or use:
#   kubectl create secret generic couchdb-credentials \
#     --namespace obsidian-sync \
#     --from-literal=COUCHDB_USER=admin \
#     --from-literal=COUCHDB_PASSWORD=<your-password>
apiVersion: v1
kind: Secret
metadata:
  name: couchdb-credentials
  namespace: obsidian-sync
type: Opaque
data:
  COUCHDB_USER: REPLACE_WITH_BASE64_USER
  COUCHDB_PASSWORD: REPLACE_WITH_BASE64_PASSWORD
