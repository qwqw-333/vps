---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb
  namespace: obsidian-sync
  labels:
    app: couchdb
spec:
  serviceName: couchdb
  replicas: 1
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      initContainers:
        - name: copy-config
          image: busybox
          command:
            - sh
            - -c
            - cp /config-src/local.ini /config-dst/local.ini && chmod 644 /config-dst/local.ini
          volumeMounts:
            - name: config-src
              mountPath: /config-src
            - name: config-dst
              mountPath: /config-dst
      containers:
        - name: couchdb
          image: couchdb:3.4
          ports:
            - containerPort: 5984
              name: http
          envFrom:
            - secretRef:
                name: couchdb-credentials
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
            - name: config-dst
              mountPath: /opt/couchdb/etc/local.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 5984
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: couchdb-data
        - name: config-src
          configMap:
            name: couchdb-config
        - name: config-dst
          emptyDir: {}
