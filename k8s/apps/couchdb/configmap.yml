---
apiVersion: v1
kind: ConfigMap
metadata:
  name: couchdb-config
  namespace: obsidian-sync
data:
  local.ini: |
    [chttpd]
    bind_address = 0.0.0.0
    port = 5984
    max_dbs_open = 500

    [httpd]
    enable_cors = true

    [cors]
    origins = *
    credentials = true
    methods = GET, POST, PUT, DELETE, HEAD
    headers = accept, authorization, content-type, origin, referer

    [cluster]
    n = 1
    q = 1

    [couchdb]
    max_document_size = 50000000

    [chttpd_auth]
    require_valid_user = true
