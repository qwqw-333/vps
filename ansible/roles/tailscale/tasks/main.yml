---
- name: Add Tailscale apt signing key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main"
    filename: tailscale
    state: present

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Create tailscaled systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/tailscaled.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure tailscaled to start after headscale
  ansible.builtin.copy:
    dest: /etc/systemd/system/tailscaled.service.d/after-headscale.conf
    content: |
      [Unit]
      After=headscale.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart tailscaled

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
    daemon_reload: true

- name: Check if Tailscale is already connected to Headscale
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Set tailscale connected fact
  ansible.builtin.set_fact:
    tailscale_connected: >-
      {{
        (tailscale_status.stdout | from_json).BackendState == 'Running'
        and (tailscale_status.stdout | from_json).CurrentTailnet is defined
        and (tailscale_status.stdout | from_json).CurrentTailnet != None
      }}
  when: tailscale_status.rc == 0 and tailscale_status.stdout != ""

- name: Set tailscale connected fact (fallback)
  ansible.builtin.set_fact:
    tailscale_connected: false
  when: tailscale_status.rc != 0 or tailscale_status.stdout == ""

- name: Connect Tailscale to Headscale
  ansible.builtin.command: >
    tailscale up
    --login-server={{ tailscale_login_server }}
    --authkey={{ tailscale_authkey }}
    --hostname={{ tailscale_hostname }}
    --accept-routes={{ tailscale_accept_routes | lower }}
  when: not tailscale_connected and tailscale_authkey != ""
  changed_when: true
  no_log: true
