---
- name: Check if ufw is installed
  ansible.builtin.command: dpkg-query -W -f='${Status}' ufw
  register: ufw_installed
  changed_when: false
  failed_when: false

- name: Configure ufw rules for Headscale
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ headscale_ufw_rules }}"
  when: ufw_installed.rc == 0

- name: Download Headscale .deb package
  ansible.builtin.get_url:
    url: "https://github.com/juanfont/headscale/releases/download/v{{ headscale_version }}/headscale_{{ headscale_version }}_linux_{{ headscale_arch }}.deb"
    dest: "/tmp/headscale.deb"
    mode: "0644"
    checksum: "sha256:8c3afb2e950e060d21bdefa98cda3accdcc1cb893bbed2e94a58de25a42f6dbe"
    timeout: 60

- name: Install Headscale from .deb
  ansible.builtin.apt:
    deb: /tmp/headscale.deb
    state: present

- name: Deploy Headscale config from template
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/headscale/config.yaml
    owner: headscale
    group: headscale
    mode: "0600"
  notify: Restart headscale

- name: Ensure Headscale data directory ownership
  ansible.builtin.file:
    path: /var/lib/headscale
    owner: headscale
    group: headscale
    recurse: true

- name: Enable and start Headscale
  ansible.builtin.systemd:
    name: headscale
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Headscale unix socket to be ready
  ansible.builtin.command: headscale users list
  register: headscale_check
  until: headscale_check.rc == 0
  retries: 10
  delay: 2
  changed_when: false
  when: headscale_user != ""

# Let's Encrypt HTTP-01 challenge can take up to ~2 min on first start
- name: Wait for Headscale HTTPS to be ready (Let's Encrypt cert)
  ansible.builtin.uri:
    url: "{{ server_url }}/health"
    status_code: 200
    validate_certs: true
  register: headscale_https_check
  until: headscale_https_check.status == 200
  retries: 24
  delay: 15
  when: headscale_user != ""

- name: Create Headscale user {{ headscale_user }}
  ansible.builtin.command: headscale users create {{ headscale_user }}
  register: headscale_user_result
  failed_when:
    - headscale_user_result.rc != 0
    - "'already exists' not in headscale_user_result.stderr"
    - "'UNIQUE constraint failed' not in headscale_user_result.stderr"
  changed_when: headscale_user_result.rc == 0
  when: headscale_user != ""

- name: Get Headscale user ID for {{ headscale_user }}
  ansible.builtin.command: headscale users list -o json
  register: headscale_users_json
  changed_when: false
  when: headscale_user != ""

- name: Set headscale_user_id fact
  ansible.builtin.set_fact:
    headscale_user_id: >-
      {{
        (headscale_users_json.stdout | from_json)
        | selectattr('name', 'equalto', headscale_user)
        | map(attribute='id')
        | first
      }}
  when: headscale_user != ""

- name: Check if Tailscale is already connected
  ansible.builtin.command: tailscale status --json
  register: ts_pre_check
  changed_when: false
  failed_when: false

- name: Set tailscale_needs_setup fact
  ansible.builtin.set_fact:
    tailscale_needs_setup: >-
      {{ ts_pre_check.rc != 0
         or ts_pre_check.stdout == ''
         or (ts_pre_check.stdout | from_json).BackendState != 'Running' }}

- name: Generate preauthkey for server self-registration
  ansible.builtin.command: >
    headscale preauthkeys create
    --user {{ headscale_user_id }}
    --expiration 5m
    -o json
  register: headscale_preauthkey_json
  changed_when: true
  no_log: true
  when: tailscale_needs_setup and headscale_user != ""

- name: Set tailscale_authkey fact for tailscale role
  ansible.builtin.set_fact:
    tailscale_authkey: "{{ (headscale_preauthkey_json.stdout | from_json).key }}"
  no_log: true
  when: tailscale_needs_setup and headscale_user != ""
