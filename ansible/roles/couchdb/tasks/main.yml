---
# Role: couchdb
# Deploys CouchDB + Caddy (reverse proxy with Cloudflare Origin CA cert) via Docker Compose

- name: Create CouchDB deployment directory
  ansible.builtin.file:
    path: "{{ couchdb_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create certs directory
  ansible.builtin.file:
    path: "{{ couchdb_dir }}/certs"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy origin certificate
  ansible.builtin.copy:
    content: "{{ origin_cert }}"
    dest: "{{ couchdb_dir }}/certs/origin-cert.pem"
    owner: root
    group: root
    mode: "0640"
  no_log: true
  notify: Restart couchdb stack

- name: Deploy origin private key
  ansible.builtin.copy:
    content: "{{ origin_key }}"
    dest: "{{ couchdb_dir }}/certs/origin-key.pem"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart couchdb stack

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ couchdb_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart couchdb stack

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ couchdb_dir }}/Caddyfile"
    owner: root
    group: root
    mode: "0640"
  notify: Restart couchdb stack

- name: Deploy CouchDB local.ini
  ansible.builtin.template:
    src: local.ini.j2
    dest: "{{ couchdb_dir }}/local.ini"
    owner: "{{ couchdb_uid }}"
    group: "{{ couchdb_uid }}"
    mode: "0644"
  notify: Restart couchdb stack

- name: Start CouchDB stack
  community.docker.docker_compose_v2:
    project_src: "{{ couchdb_dir }}"
    state: present
    pull: missing

- name: Flush handlers before CouchDB init
  ansible.builtin.meta: flush_handlers

- name: Wait for CouchDB to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:5984/"
    user: "{{ couchdb_user }}"
    password: "{{ couchdb_password }}"
    force_basic_auth: true
  register: _couchdb_health
  until: _couchdb_health.status == 200
  retries: 10
  delay: 3

- name: Finish CouchDB single-node setup
  ansible.builtin.uri:
    url: "http://127.0.0.1:5984/_cluster_setup"
    method: POST
    user: "{{ couchdb_user }}"
    password: "{{ couchdb_password }}"
    force_basic_auth: true
    body_format: json
    body:
      action: finish_cluster
    status_code: [200, 201, 400]
  register: _cluster_setup
  changed_when: _cluster_setup.status in [200, 201]
  failed_when: >-
    _cluster_setup.status == 400
    and (_cluster_setup.json.reason | default('')) != 'Cluster is already finished'
