---
# Role: caddy
# Deploys Caddy reverse proxy with Cloudflare Origin CA cert via Docker Compose

- name: Create Caddy deployment directory
  ansible.builtin.file:
    path: "{{ caddy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create certs directory
  ansible.builtin.file:
    path: "{{ caddy_dir }}/certs"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy origin certificate
  ansible.builtin.copy:
    content: "{{ origin_cert }}"
    dest: "{{ caddy_dir }}/certs/origin-cert.pem"
    owner: root
    group: root
    mode: "0640"
  no_log: true
  notify: Restart caddy stack

- name: Deploy origin private key
  ansible.builtin.copy:
    content: "{{ origin_key }}"
    dest: "{{ caddy_dir }}/certs/origin-key.pem"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart caddy stack

- name: Deploy compose.yaml
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ caddy_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart caddy stack

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_dir }}/Caddyfile"
    owner: root
    group: root
    mode: "0640"
  notify: Restart caddy stack

- name: Start Caddy stack
  community.docker.docker_compose_v2:
    project_src: "{{ caddy_dir }}"
    state: present
    pull: missing
